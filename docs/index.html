<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veille Formation — BGE Franche-Comté</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f2f6fb; color: #000; }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 4px solid #45BCCF;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header img { height: 70px; }
    .header-divider {
      width: 2px;
      height: 50px;
      background: #45BCCF;
    }
    .header-text h1 {
      font-family: Arial, sans-serif;
      font-size: 1.4rem;
      font-weight: bold;
      color: #004999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .header-text p {
      font-size: 0.82rem;
      color: #93B0B6;
      margin-top: 3px;
    }

    /* BARRE LATERALE + LAYOUT */
    .page-layout {
      display: flex;
      min-height: calc(100vh - 110px);
    }
    .sidebar {
      width: 8px;
      background: #45BCCF;
      flex-shrink: 0;
    }
    .main { flex: 1; padding: 28px 32px; }

    /* TOOLBAR */
    .toolbar {
      background: #fff;
      border-radius: 6px;
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
      border-left: 4px solid #009FE3;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid #c8d8e8;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
      color: #000;
      outline: none;
    }
    .toolbar input[type="text"]:focus { border-color: #004999; }
    .toolbar select {
      padding: 8px 12px;
      border: 1px solid #c8d8e8;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
      color: #000;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .toolbar select:focus { border-color: #004999; }

    #count {
      font-size: 0.8rem;
      color: #93B0B6;
      margin-bottom: 12px;
    }

    #loading, #error {
      text-align: center;
      padding: 60px 20px;
      font-size: 0.95rem;
      color: #93B0B6;
    }
    #error { color: #E63328; }

    /* ARTICLE CARD */
    .article {
      background: #fff;
      border-radius: 4px;
      padding: 16px 20px 16px 18px;
      margin-bottom: 10px;
      border-left: 5px solid #004999;
    }
    .article:hover { border-left-color: #009FE3; }

    .article h2 {
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: bold;
      color: #004999;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .article h2 a { color: #004999; text-decoration: none; }
    .article h2 a:hover { color: #0072A7; text-decoration: underline; }

    .article .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 7px;
    }
    .badge {
      background: #e6f4fb;
      color: #0072A7;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .date { font-size: 0.77rem; color: #93B0B6; }

    .article p {
      font-size: 0.85rem;
      color: #333;
      line-height: 1.55;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .pagination button {
      padding: 6px 14px;
      border: 1px solid #c8d8e8;
      background: #fff;
      color: #004999;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-size: 0.83rem;
      font-weight: bold;
    }
    .pagination button.active {
      background: #004999;
      color: #fff;
      border-color: #004999;
    }
    .pagination button:hover:not(.active) {
      background: #e6f4fb;
      border-color: #009FE3;
    }

    /* FOOTER */
    footer {
      background: #004999;
      text-align: center;
      padding: 14px;
      font-family: Arial, sans-serif;
      font-size: 0.72rem;
      color: #45BCCF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    footer a { color: #45BCCF; text-decoration: none; }
    footer a:hover { color: #fff; }
  </style>
</head>
<body>

  <header>
    <img src="logo-bge.png" alt="BGE Franche-Comté — Appui aux entrepreneurs" />
    <div class="header-divider"></div>
    <div class="header-text">
      <h1>Veille Formation</h1>
      <p>Formation professionnelle · CPF · Qualiopi · Entrepreneuriat</p>
    </div>
  </header>

  <div class="page-layout">
    <div class="sidebar"></div>
    <div class="main">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Rechercher un mot-clé..." />
        <select id="sourceFilter">
          <option value="">Toutes les sources</option>
        </select>
      </div>
      <div id="count"></div>
      <div id="loading">Chargement des articles…</div>
      <div id="error" style="display:none;"></div>
      <div id="articles"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <footer>
    BGE Franche-Comté &nbsp;·&nbsp; Appui aux entrepreneurs &nbsp;·&nbsp;
    <a href="https://www.bgefc.org" target="_blank">bgefc.org</a>
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://izxetyflcrbbukevgkbf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6eGV0eWZsY3JiYnVrZXZna2JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjM0MzcsImV4cCI6MjA5NzY5OTQzN30.mM_ASVSU9ZdOBzL6KLFtkyOxnXFFoqu6gNrEVnGNW9w'
    );

    const PAGE_SIZE = 20;
    let allArticles = [];
    let filtered = [];
    let currentPage = 1;

    async function loadArticles() {
      const { data, error } = await supabase
        .from('articles')
        .select('*')
        .order('date_publication', { ascending: false });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Erreur de chargement : ' + error.message;
        return;
      }

      allArticles = data;
      populateSourceFilter();
      applyFilters();
    }

    function populateSourceFilter() {
      const sources = [...new Set(allArticles.map(a => a.source))].sort();
      const sel = document.getElementById('sourceFilter');
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        sel.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const src = document.getElementById('sourceFilter').value;
      filtered = allArticles.filter(a => {
        const matchQ = !q || a.titre.toLowerCase().includes(q) || (a.resume || '').toLowerCase().includes(q);
        const matchSrc = !src || a.source === src;
        return matchQ && matchSrc;
      });
      currentPage = 1;
      render();
    }

    function render() {
      const start = (currentPage - 1) * PAGE_SIZE;
      const page = filtered.slice(start, start + PAGE_SIZE);
      const container = document.getElementById('articles');
      const n = filtered.length;
      document.getElementById('count').textContent = `${n} article${n > 1 ? 's' : ''}`;

      if (n === 0) {
        container.innerHTML = '<p style="text-align:center;color:#93B0B6;padding:40px;">Aucun article trouvé.</p>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      container.innerHTML = page.map(a => {
        const date = a.date_publication
          ? new Date(a.date_publication).toLocaleDateString('fr-FR')
          : '';
        return `
          <div class="article">
            <h2><a href="${a.lien}" target="_blank" rel="noopener">${a.titre}</a></h2>
            <div class="meta">
              <span class="badge">${a.source}</span>
              ${date ? `<span class="date">${date}</span>` : ''}
            </div>
            ${a.resume ? `<p>${a.resume}</p>` : ''}
          </div>
        `;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      container.innerHTML = html;
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('sourceFilter').addEventListener('change', applyFilters);

    loadArticles();
  </script>
</body>
</html>
